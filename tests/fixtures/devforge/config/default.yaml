# DevForge Platform - Default Configuration
server:
  port: 8080
  host: "0.0.0.0"
  read_timeout: 15s
  write_timeout: 30s
  shutdown_timeout: 10s

auth:
  enabled: true
  jwt:
    secret: "${JWT_SECRET}"
    ttl: 24h
    issuer: "devforge"
  oauth:
    providers:
      - name: github
        client_id: "${GITHUB_CLIENT_ID}"
        client_secret: "${GITHUB_CLIENT_SECRET}"
        auth_url: "https://github.com/login/oauth/authorize"
        token_url: "https://github.com/login/oauth/access_token"
        scopes:
          - "read:user"
          - "user:email"
      - name: google
        client_id: "${GOOGLE_CLIENT_ID}"
        client_secret: "${GOOGLE_CLIENT_SECRET}"
        auth_url: "https://accounts.google.com/o/oauth2/auth"
        token_url: "https://oauth2.googleapis.com/token"
        scopes:
          - "openid"
          - "profile"
          - "email"

database:
  driver: sqlite3
  path: "devforge.db"
  max_connections: 25
  connection_timeout: 5s
  pool:
    min_idle: 5
    max_idle: 10
    max_lifetime: 30m

storage:
  artifacts:
    path: "./data/artifacts"
    max_size: 10737418240
    allowed_extensions:
      - ".tar.gz"
      - ".zip"
      - ".jar"
      - ".whl"
      - ".gem"

rate_limit:
  enabled: true
  requests_per_minute: 100
  burst: 200
  per_ip: true
  per_user: true

worker:
  concurrency: 4
  poll_interval: 5s
  max_retry: 3
  queue_size: 1000

logging:
  level: info
  format: json
  output: stdout
  file: ""
  redact_sensitive: true

metrics:
  enabled: true
  port: 9090
  path: "/metrics"

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
  allowed_headers:
    - "Content-Type"
    - "Authorization"
    - "X-Request-ID"
  max_age: 86400
